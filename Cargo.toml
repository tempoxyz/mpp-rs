[package]
name = "mpay"
version = "0.1.0"
edition = "2021"
description = "Micropayments Protocol - Rust library for Web Payment Auth (IETF draft-ietf-httpauth-payment)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/tempoxyz/mpay-rs"
homepage = "https://github.com/tempoxyz/mpay-rs"
documentation = "https://docs.rs/mpay"
readme = "README.md"
keywords = ["http", "payments", "402", "authentication", "web3"]
categories = ["web-programming", "authentication", "cryptography"]

[features]
default = ["tempo"]
evm = ["alloy", "alloy-signer-local", "hex", "rand"]
tempo = ["evm", "tempo-alloy", "tempo-primitives"]
utils = ["hex", "rand"]
http = ["reqwest"]
middleware = ["http", "reqwest-middleware", "async-trait", "anyhow", "http-types"]

[dependencies]
# Core dependencies (always included)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

# Optional dependencies
hex = { version = "0.4", optional = true }
base64 = "0.22"
rand = { version = "0.8", optional = true }
alloy = { version = "1.2", features = ["full"], optional = true }
alloy-signer-local = { version = "1.2", optional = true }

# Tempo dependencies (optional, git-based)
tempo-alloy = { git = "https://github.com/tempoxyz/tempo", default-features = false, optional = true }
tempo-primitives = { git = "https://github.com/tempoxyz/tempo", default-features = false, features = ["serde"], optional = true }

# HTTP client dependencies (optional)
reqwest = { version = "0.12", features = ["json"], optional = true }
reqwest-middleware = { version = "0.4", optional = true }
async-trait = { version = "0.1", optional = true }
anyhow = { version = "1", optional = true }
http-types = { package = "http", version = "1", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
