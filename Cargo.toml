[package]
name = "mpp-rs"
version = "0.1.0"
edition = "2021"
description = "Micropayments Protocol - Rust library for Web Payment Auth (IETF draft-ietf-httpauth-payment)"
license = "MIT OR Apache-2.0"

[features]
default = ["evm"]
evm = ["alloy", "alloy-signer-local", "hex", "rand"]
tempo = ["evm", "tempo-primitives"]
keystore = ["eth-keystore", "zeroize", "rand", "hex"]
utils = ["bs58", "hex", "base64", "rand"]
stripe = []
client = ["http-client", "evm"]
http-client = ["reqwest", "tracing", "tokio", "async-trait"]
tower-middleware = ["tower", "tower-service", "http", "http-body", "http-body-util", "pin-project-lite", "tokio", "async-trait"]
reqwest-middleware = ["dep:reqwest-middleware", "http", "reqwest", "tokio", "async-trait"]
middleware = ["tower-middleware", "reqwest-middleware"]

[dependencies]
# Core dependencies (always included)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"

# Optional dependencies
tokio = { version = "1.49", features = ["full"], optional = true }
async-trait = { version = "0.1", optional = true }
bs58 = { version = "0.5", optional = true }
hex = { version = "0.4", optional = true }
base64 = { version = "0.22", optional = true }
rand = { version = "0.8", optional = true }
reqwest = { version = "0.12", features = ["rustls-tls", "blocking"], optional = true }
tracing = { version = "0.1", optional = true }
zeroize = { version = "1.8", features = ["derive"], optional = true }
alloy = { version = "1.2", features = ["full"], optional = true }
alloy-signer-local = { version = "1.2", optional = true }
eth-keystore = { version = "0.5", optional = true }
tempo-primitives = { git = "https://github.com/tempoxyz/tempo.git", rev = "07dfcd2d2b8c109d6b8502515c7db00198a8b3a3", features = ["serde"], optional = true }
tower = { version = "0.5", optional = true }
tower-service = { version = "0.3", optional = true }
http = { version = "1.2", optional = true }
http-body = { version = "1.0", optional = true }
http-body-util = { version = "0.1", optional = true }
pin-project-lite = { version = "0.2", optional = true }
reqwest-middleware = { version = "0.4", optional = true }

[dev-dependencies]
serde_json = "1"
tempfile = "3.24"
