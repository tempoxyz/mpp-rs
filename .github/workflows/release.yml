name: Release
on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install changelogs
        run: |
          curl -fsSL https://raw.githubusercontent.com/wevm/changelogs-rs/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Changelogs
        uses: wevm/changelogs-rs@changelogs@0.4.0
        with:
          conventional-commit: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
