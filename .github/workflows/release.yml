name: Release
on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure git credentials for tag push
        run: |
          git config --local http.https://github.com/.extraheader \
            "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Changelogs
        uses: tempoxyz/changelogs@a160c1637ff9cf1529cddedd17cca47a276423e8 # changelogs@0.6.3
        with:
          ecosystem: rust
          conventional-commit: true
          crate-token: ${{ steps.auth.outputs.token }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
