name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-features -- -D warnings
      - name: Run Tempo Lints
        uses: tempoxyz/lints@main
        with:
          language: rust
          path: "."
          post-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo test --features tempo,server,client,axum,middleware,tower,utils
      - run: cargo hack check --each-feature --no-dev-deps --skip integration

  feature-matrix:
    name: "Features: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "core only"
            features: "--no-default-features"
          - name: "client"
            features: "--features client"
          - name: "server"
            features: "--features server"
          - name: "evm"
            features: "--features evm"
          - name: "tempo"
            features: "--features tempo"
          - name: "server,tempo"
            features: "--features server,tempo"
          - name: "client,server,tempo"
            features: "--features client,server,tempo"
          - name: "client,server,tempo,middleware"
            features: "--features client,server,tempo,middleware"
          - name: "all (no integration)"
            features: "--features client,server,tempo,axum,tower,middleware,utils"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}
      - run: cargo check ${{ matrix.features }}
      - run: cargo test ${{ matrix.features }}

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start Tempo node
        run: docker compose up -d

      - name: Wait for Tempo node
        run: |
          echo "Waiting for Tempo node to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8545 -X POST \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' > /dev/null 2>&1; then
              echo "Tempo node ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Tempo node failed to start"
          docker compose logs
          exit 1

      - name: Run integration tests
        run: cargo test --features integration --test integration_charge -- --nocapture
        env:
          TEMPO_RPC_URL: http://localhost:8545

      - name: Tempo node logs
        if: failure()
        run: docker compose logs

      - name: Stop Tempo node
        if: always()
        run: docker compose down
