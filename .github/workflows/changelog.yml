name: Changelog

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - ".github/**"

jobs:
  changelog:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Remove repo-local Claude settings
        run: rm -rf .claude/
      - name: Check changelog
        uses: tempoxyz/changelogs/check@466632795bfca34dc9bb7f7bcab9f50c6e3f3726 # master
        with:
          ai: "npx -y @anthropic-ai/claude-code@2.1.96 --bare -p"
          ecosystem: rust
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
