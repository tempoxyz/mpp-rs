name: Changelog

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  changelog:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.96
      - name: Remove repo-local Claude settings
        run: rm -rf .claude/
      - name: Check changelog
        uses: tempoxyz/changelogs/check@f168e5c51e24831f7145eda2725cc3597b9c46cb # master
        with:
          ai: "claude --bare -p"
          ecosystem: rust
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
