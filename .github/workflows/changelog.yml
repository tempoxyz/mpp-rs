name: Changelog

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - ".github/**"

jobs:
  changelog:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Remove repo-local Claude settings
        run: rm -rf .claude/
      - name: Check changelog
        uses: tempoxyz/changelogs/check@a160c1637ff9cf1529cddedd17cca47a276423e8 # changelogs@0.6.3
        with:
          ai: "npx -y @anthropic-ai/claude-code@2.1.96 --bare -p"
          ecosystem: rust
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
