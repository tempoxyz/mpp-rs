name: Changelog
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install Amp CLI
        run: npm install -g @sourcegraph/amp

      - name: Generate changelog if missing
        uses: wevm/changelogs-rs/gen@changelogs@0.4.0
        with:
          ai: 'amp -x'
          conventional-commit: true
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
