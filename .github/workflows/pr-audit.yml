name: PR Audit

on:
  pull_request:
    types: [labeled]

permissions: {}

jobs:
  authorize:
    if: github.event.label.name == 'cyclops'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check admin permission
        env:
          GH_TOKEN: ${{ github.token }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${SENDER_LOGIN}/permission" --jq '.permission')
          if [[ "$PERM" != "admin" ]]; then
            echo "::error::Only admins can trigger pr-audit (got: $PERM)"
            exit 1
          fi

  pr-audit:
    needs: authorize
    permissions:
      contents: read
    uses: tempoxyz/gh-actions/.github/workflows/pr-audit.yml@512158c4e90e42eef8aa7fc3fc3186a79b5b4648
    secrets:
      EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
      EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
      EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
